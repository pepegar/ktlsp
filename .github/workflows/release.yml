name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read crate version
        id: version
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/ktlsp/Cargo.toml | head -n 1)
          if [ -z "$version" ]; then
            echo "Failed to read version from crates/ktlsp/Cargo.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag matches crate version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version ($tag) does not match Cargo.toml version (${{ steps.version.outputs.version }})" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - runner: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --bin ktlsp --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pkg_root="dist/ktlsp-${{ matrix.target }}"
          mkdir -p "$pkg_root"
          cp "target/${{ matrix.target }}/release/ktlsp" "$pkg_root/"
          cp README.md "$pkg_root/"
          tar -C dist -czf "dist/ktlsp-${{ matrix.target }}.tar.gz" "ktlsp-${{ matrix.target }}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkgRoot = "dist/ktlsp-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $pkgRoot | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/ktlsp.exe" "$pkgRoot/ktlsp.exe"
          Copy-Item "README.md" "$pkgRoot/README.md"
          Compress-Archive -Path $pkgRoot -DestinationPath "dist/ktlsp-${{ matrix.target }}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/ktlsp-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
